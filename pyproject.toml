[build-system]
requires = ["setuptools>=68,<81", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "crucible-stack"
version = "0.1.0.dev0"
description = "A framework for defining, searching, sizing and deploying trading strategies. Strategies not included."
readme = "README.md"
requires-python = ">=3.11"
license = {text = "MIT"}
authors = [{name = "Matt Spinola"}]
dependencies = [
    "numpy>=2.0",
    "pandas>=2.0",
    "pyyaml>=6.0",
    "pydantic>=2.0",
    # TEMPORARY direct reference, not a normal pin. The honest-N API this package
    # depends on -- deflated_sharpe(..., n_trials=) and sidak_correction(SearchSpaceLog)
    # -- landed in crucible after the v0.2.0 tag, so PyPI 0.2.0 does NOT satisfy us and
    # "crucible>=0.2.0" would resolve to a version that TypeErrors inside select().
    # Replace with "crucible>=0.3.0" once that release is published; this repo cannot
    # be uploaded to PyPI while a direct reference is here.
    "crucible @ git+https://github.com/mspinola/crucible@main",
]

[project.optional-dependencies]
dev = ["pytest>=8.0"]

[tool.setuptools.packages.find]
include = ["crucible_stack*"]
